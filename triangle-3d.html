<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário Triangular 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; background: #f0ebe3; }
        #canvas { width: 100%; height: 100%; display: block; touch-action: none; }
        #loading {
            position: fixed; inset: 0; background: #f0ebe3;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 20px; z-index: 100;
            transition: opacity 0.6s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .spinner { width: 40px; height: 40px; border: 3px solid #d5d0c8; border-top-color: #2c5f2d; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #ui {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; align-items: center;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
            padding: 10px 18px; border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12); z-index: 10;
        }
        #ui select, #ui button {
            font-size: 14px; padding: 7px 14px; border-radius: 8px;
            border: 1px solid #d5d0c8; outline: none; cursor: pointer;
            background: white; transition: all 0.2s;
        }
        #ui button { background: #2c5f2d; color: white; border-color: #2c5f2d; font-weight: 600; }
        #ui button:hover { background: #1a3d1a; }
        #ui select:hover { border-color: #2c5f2d; }
        #hint {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            color: #888; font-size: 13px; z-index: 5;
            background: rgba(255,255,255,0.6); backdrop-filter: blur(8px);
            padding: 6px 14px; border-radius: 20px; transition: opacity 1s;
        }
        #hint.fade { opacity: 0; }
        @media (max-width: 600px) {
            #ui { flex-wrap: wrap; justify-content: center; bottom: 20px; padding: 8px 12px; }
            #ui select, #ui button { font-size: 12px; padding: 5px 10px; }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div style="color: #666; font-size: 15px;">A carregar cena 3D...</div>
    </div>
    <canvas id="canvas"></canvas>
    <div id="hint">Arrasta para rodar · Scroll para zoom</div>
    <div id="ui">
        <button id="prev-month" title="Mês anterior">◀</button>
        <select id="month-select"></select>
        <button id="next-month" title="Mês seguinte">▶</button>
        <button id="reset-view">Reset</button>
    </div>

    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="js/configs/triangle.js"></script>
    <script src="js/viewer-babylon.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const loading = document.getElementById('loading');
        const monthSelect = document.getElementById('month-select');
        const hint = document.getElementById('hint');

        TRIANGLE_CONFIG.meses.forEach((m, i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = m;
            monthSelect.appendChild(opt);
        });
        monthSelect.value = new Date().getMonth();

        const viewer = new ViewerBabylon(canvas, TRIANGLE_CONFIG);

        setTimeout(() => loading.classList.add('hidden'), 300);
        setTimeout(() => hint.classList.add('fade'), 4000);

        const updateSelect = () => { monthSelect.value = viewer.monthIndex; };

        document.getElementById('prev-month').addEventListener('click', () => {
            viewer.flipPage(-1);
            setTimeout(updateSelect, 600);
        });
        document.getElementById('next-month').addEventListener('click', () => {
            viewer.flipPage(1);
            setTimeout(updateSelect, 600);
        });

        monthSelect.addEventListener('change', () => {
            const val = parseInt(monthSelect.value);
            const diff = val - viewer.monthIndex;
            if (diff > 6) viewer.flipPage(-1);
            else if (diff < -6) viewer.flipPage(1);
            else if (diff > 0) viewer.flipPage(1);
            else if (diff < 0) viewer.flipPage(-1);
        });

        document.getElementById('reset-view').addEventListener('click', () => {
            viewer.camera.alpha = -0.6;
            viewer.camera.beta = 1.1;
            viewer.camera.radius = 12;
            viewer.camera.target = new BABYLON.Vector3(0, 1.5, 0);
        });
    </script>
</body>
</html>
