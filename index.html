<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário de Parede - Mockup Interativo</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Container principal da aplicação -->
    <div id="app-container">
        <!-- Container do viewer (área de visualização) -->
        <div id="viewer-container">
            <!-- A folha base e macetes serão inseridos aqui pelo JavaScript -->
        </div>
        
        <!-- Container da UI (painel de controle) -->
        <div id="ui-container">
            <!-- Os controles serão inseridos aqui pelo JavaScript -->
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/config.js"></script>
    <script src="js/macete.js"></script>
    <script src="js/viewer.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
